name: Deploy TalentHub Admin to Server

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      deploy_branch:
        description: "Branch to deploy to the server"
        required: true
        default: "main"

jobs:
  deploy:
    name: Deploy to Rocky Linux Server
    runs-on: ubuntu-latest

    steps:
      - name: Show deployment details
        run: |
          echo "Triggered by: ${{ github.actor }}"
          echo "Event name: ${{ github.event_name }}"
          echo "Selected deploy branch: ${{ github.event.inputs.deploy_branch || github.ref_name }}"

      - name: Deploy using SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            DEPLOY_BRANCH="${{ github.event.inputs.deploy_branch || github.ref_name }}"

            echo "Starting TalentHub Admin deployment..."
            echo "Deploy branch: $DEPLOY_BRANCH"

            echo "Moving to project directory..."
            cd /home/dpd/apps/talenthub-admin

            echo "Fetching selected branch..."
            git fetch origin "$DEPLOY_BRANCH"

            echo "Resetting server code to selected branch..."
            git reset --hard "origin/$DEPLOY_BRANCH"

            echo "Current deployed commit:"
            git log -1 --oneline

            echo "Creating backend environment file..."
            cat > backend/.env <<'EOF'
            PORT=${{ secrets.BACKEND_PORT }}
            NODE_ENV=${{ secrets.NODE_ENV }}
            MONGO_URI=${{ secrets.MONGO_URI }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}
            TALENTHUB_FEDERATION_SECRET=${{ secrets.TALENTHUB_FEDERATION_SECRET }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            GOOGLE_REDIRECT_URI=${{ secrets.GOOGLE_REDIRECT_URI }}
            GMAIL_USER=${{ secrets.GMAIL_USER }}
            GMAIL_PASS=${{ secrets.GMAIL_PASS }}
            TRAINEES_API_SECRET_KEY=${{ secrets.TRAINEES_API_SECRET_KEY }}
            BYPASS_TIME_CHECK=${{ secrets.BYPASS_TIME_CHECK }}
            ATTENDANCE_SYSTEM_URL=${{ secrets.ATTENDANCE_SYSTEM_URL }}
            ATTENDANCE_SYSTEM_SYNC_ENABLED=${{ secrets.ATTENDANCE_SYSTEM_SYNC_ENABLED }}
            SHORT_LEAVE_EMAIL=${{ secrets.SHORT_LEAVE_EMAIL }}
            SHORT_LEAVE_SMTP_HOST=${{ secrets.SHORT_LEAVE_SMTP_HOST }}
            SHORT_LEAVE_SMTP_PORT=${{ secrets.SHORT_LEAVE_SMTP_PORT }}
            SHORT_LEAVE_RECIPIENT=${{ secrets.SHORT_LEAVE_RECIPIENT }}
            AUTO_CLEANUP_INACTIVE_INTERNS=${{ secrets.AUTO_CLEANUP_INACTIVE_INTERNS }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            GEMINI_BASE_URL=${{ secrets.GEMINI_BASE_URL }}
            TZ=${{ secrets.TZ }}
            ATTENDANCE_SLT_LAT=${{ secrets.ATTENDANCE_SLT_LAT }}
            ATTENDANCE_SLT_LNG=${{ secrets.ATTENDANCE_SLT_LNG }}
            ATTENDANCE_MAX_DISTANCE_METERS=${{ secrets.ATTENDANCE_MAX_DISTANCE_METERS }}
            ATTENDANCE_MAX_LOCATION_ACCURACY_METERS=${{ secrets.ATTENDANCE_MAX_LOCATION_ACCURACY_METERS }}
            ATTENDANCE_MAX_LOCATION_AGE_MS=${{ secrets.ATTENDANCE_MAX_LOCATION_AGE_MS }}
            EOF

            echo "Installing backend dependencies..."
            cd backend
            npm install

            echo "Restarting TalentHub backend..."
            pm2 restart talenthub-admin-backend
            pm2 save

            echo "Creating frontend production environment file..."
            cd ../client
            cat > .env.production <<'EOF'
            VITE_BACKEND_URL=${{ secrets.VITE_BACKEND_URL }}
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
            EOF

            echo "Installing frontend dependencies..."
            npm install

            echo "Building frontend..."
            npm run build

            echo "Deploying frontend build to Nginx web root..."
            rm -rf /var/www/talenthub-admin/*
            cp -r dist/* /var/www/talenthub-admin/

            echo "Checking PM2 status..."
            pm2 status

            echo "Testing backend locally..."
            curl -I http://localhost:${{ secrets.BACKEND_PORT }}/api || true

            echo "Deployment completed successfully."