name: Deploy TalentHub Admin

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Rocky Linux Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy using SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            echo "Starting TalentHub Admin deployment..."

            echo "Moving to project directory..."
            cd /home/dpd/apps/talenthub-admin

            echo "Pulling latest code from main branch..."
            git fetch origin main
            git reset --hard origin/main

            echo "Creating backend environment file..."
            cat > backend/.env <<EOF
            PORT=${{ secrets.BACKEND_PORT }}
            MONGO_URI=${{ secrets.MONGO_URI }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            GOOGLE_REDIRECT_URI=${{ secrets.GOOGLE_REDIRECT_URI }}
            GMAIL_USER=${{ secrets.GMAIL_USER }}
            GMAIL_PASS=${{ secrets.GMAIL_PASS }}
            EOF

            echo "Installing backend dependencies..."
            cd backend
            npm install

            echo "Restarting only TalentHub backend PM2 process..."
            pm2 restart talenthub-admin-backend
            pm2 save

            echo "Creating frontend production environment file..."
            cd ../client
            cat > .env.production <<EOF
            VITE_BACKEND_URL=${{ secrets.VITE_BACKEND_URL }}
            EOF

            echo "Installing frontend dependencies..."
            npm install

            echo "Building frontend..."
            npm run build

            echo "Deploying frontend build to Nginx web root..."
            rm -rf /var/www/talenthub-admin/*
            cp -r dist/* /var/www/talenthub-admin/

            echo "Checking backend PM2 status..."
            pm2 status

            echo "Deployment completed successfully."