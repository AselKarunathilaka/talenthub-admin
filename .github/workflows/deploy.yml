name: Deploy Intern Portal to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: SSH Deploy with Testing
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 20.205.22.95
          username: dpd
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "🧹 Cleanup old temporary test clone..."
            rm -rf ~/Intern_Portal/tempery

            echo "📥 Clone repo into temp folder..."
            git clone git@github.com:Devora-Org/Source-Code.git ~/Intern_Portal/tempery

            echo "🚀 Start temporary backend for testing..."
            cd ~/Intern_Portal/tempery/backend
            npm install
            PORT=4050 pm2 start server.js --name "Tempery_Lakindu-Intern-Portal"

            echo "⏳ Wait for backend to initialize..."
            sleep 10

            echo "🔎 Health check backend and MongoDB..."
            STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4050/api/test)
            echo "✅ Backend and DB working fine"

            echo "🔧 Build frontend in temp folder..."
            cd ~/Intern_Portal/tempery/frontend
            npm install
            npm run build

            if [ ! -s dist/index.html ]; then
              echo "❌ Frontend build failed or empty"
              pm2 delete "Tempery_Lakindu-Intern-Portal"
              exit 1
            fi
            pm2 delete "Tempery_Lakindu-Intern-Portal"
            echo "🗑 Stop production backend and deploy changes..."
            pm2 delete "Lakindu-Intern-Portal" || true

            echo "🧹 Remove old Source-Code"
            rm -rf ~/Intern_Portal/Source-Code

            echo "📦 Move temp code to Source-Code"
            mv ~/Intern_Portal/tempery ~/Intern_Portal/Source-Code

            echo "🚀 Start production backend on port 4020..."
            cd ~/Intern_Portal/Source-Code/backend
            PORT=4020 pm2 start server.js --name "Lakindu-Intern-Portal"

            echo "📂 Copy frontend build to /opt/internal-portal/"
            sudo rm -rf /opt/internal-portal/*
            sudo cp -r ~/Intern_Portal/Source-Code/frontend/dist/* /opt/internal-portal/

            echo "✅ Reload Nginx"
            sudo nginx -t && sudo systemctl reload nginx

            echo "🎉 Deployment completed successfully!"
